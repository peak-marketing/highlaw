<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 | 법무법인 하이로</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/sub.css" />
</head>
<body class="sub-page admin-page">
  <main class="admin-shell">
    <section class="admin-login" id="loginPanel">
      <div class="admin-brand">
        <span class="logo-en">HIGHLAW</span>
        <span class="logo-kr">법무법인 하이로</span>
      </div>
      <h1>관리자 로그인</h1>
      <form id="loginForm" class="contact-form">
        <div class="form-group">
          <input type="text" name="username" placeholder="아이디" value="admin" autocomplete="username" />
        </div>
        <div class="form-group">
          <input type="password" name="password" placeholder="비밀번호" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn-submit">로그인</button>
      </form>
      <p class="admin-help">초기 비밀번호는 서버 환경변수 ADMIN_PASSWORD로 변경하세요.</p>
      <p class="admin-message" id="adminMessage"></p>
    </section>

    <section class="admin-panel" id="adminPanel" hidden>
      <header class="admin-topbar">
        <div>
          <span class="sub-section__label">Admin</span>
          <h1>예약 관리</h1>
        </div>
        <div class="admin-topbar__actions">
          <a href="reservation.html">고객 화면</a>
          <button type="button" id="logoutBtn">로그아웃</button>
        </div>
      </header>

      <div class="admin-grid">
        <section class="booking-calendar">
          <div class="booking-toolbar">
            <button type="button" id="adminPrevMonth" class="booking-nav" aria-label="이전 달">‹</button>
            <h3 id="adminCalendarTitle">0000.00</h3>
            <button type="button" id="adminNextMonth" class="booking-nav" aria-label="다음 달">›</button>
          </div>
          <div class="booking-grid" id="adminCalendarGrid"></div>
        </section>

        <section class="booking-slots">
          <span class="sub-section__label">Selected Date</span>
          <h3 id="adminSelectedDateText">선택 날짜</h3>
          <div class="booking-slot-list" id="adminSlotList"></div>
        </section>

        <section class="admin-editor">
          <span class="sub-section__label">Edit Time</span>
          <h2>시간대 추가/수정</h2>
          <form id="reservationForm" class="contact-form">
            <input type="hidden" name="id" id="reservationId" />
            <div class="form-row">
              <div class="form-group">
                <input type="date" name="date" id="reservationDate" required />
              </div>
              <div class="form-group">
                <input type="time" name="time" id="reservationTime" required />
              </div>
            </div>
            <div class="form-group">
              <select name="status" required>
                <option value="available">예약 가능</option>
                <option value="booked">예약 완료</option>
                <option value="closed">마감</option>
                <option value="consulting">상담중</option>
              </select>
            </div>
            <div class="form-row">
              <div class="form-group">
                <input type="text" name="client_name" placeholder="고객명" />
              </div>
              <div class="form-group">
                <input type="text" name="client_phone" placeholder="연락처" />
              </div>
            </div>
            <div class="form-group">
              <input type="text" name="matter_type" placeholder="사건 유형" />
            </div>
            <div class="form-group">
              <textarea name="memo" rows="5" placeholder="관리자 메모"></textarea>
            </div>
            <div class="admin-editor__buttons">
              <button type="submit" class="btn-submit">저장</button>
              <button type="button" id="resetFormBtn">새로 입력</button>
            </div>
          </form>
        </section>
      </div>
    </section>
  </main>

  <script src="js/admin.js"></script>
</body>
</html>
